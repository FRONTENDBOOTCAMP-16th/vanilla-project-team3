<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <title>바닐라 팀프로젝트 문학소녀팀</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="오늘의 날씨/기분을 선택해 책 문구를 추천받는 사이트"
    />
    <link rel="icon" href="/bookicon.svg" />
    <script type="module" defer src="/src/main.js"></script>
    <script type="module" defer src="/src/pages/login/login.js"></script>
  </head>
  <body>
    <main class="container">
      <section class="auth-block login-block">
        <!-- 네비게이션 시작 -->
        <nav class="navi-layout">
          <a href="/index.html" class="navi-home-button">
            <span class="sr-only">홈으로 돌아가기</span>
          </a>
        </nav>
        <!-- 네비게이션 끝 -->
        <div class="autu-box-form login-form" role="login">
          <!-- 메인(인트로) 리턴 버튼 끝 -->
          <!-- 로그인 폼  -->
          <div class="autu-login-box login-platform">
            <p class="autu-title login-title">로그인</p>
            <form
              action=""
              method="get"
              class="autu-box-container login-write"
              id="login-container"
              role="로그인영역"
            >
              <!-- autu-input-box를 추가하여 공통 CSS 디자인 적용 -->
              <div class="autu-input-box id-input-box" aria-label="아이디입력">
                <label for="id-input-area" class="sr-only id-label"
                  >아이디</label
                >
                <input
                  type="text"
                  class="add-box id-box"
                  id="id-input-area"
                  placeholder="아이디를 입력해 주세요"
                  required
                />
              </div>
              <div
                class="autu-input-box pw-input-box"
                aria-label="비밀번호입력"
              >
                <label for="pw-input-area" class="sr-only pw-label"
                  >비밀번호</label
                >
                <input
                  type="password"
                  class="add-box pw-box"
                  id="pw-input-area"
                  placeholder="비밀번호를 입력해 주세요"
                  required
                />
              </div>
              <!-- 메시지를 로그인 버튼 위로 옮기고, 텍스트 길이를 줄임으로써 로그인 버튼이 길어지는 현상을 고침 -->
              <!-- hidden속성을 css의 visibility로 대신하여 input이 안밀리도록 설정 -->
              <!-- <span class="warning-block noti-blank-warning" hidden
                >아이디 또는 비밀번호가 잘못 되었습니다. 아이디와 비밀번호를
                정확히 입력해 주세요.</span
              > -->
              <span class="warning-block noti-blank-warning"
                >아이디 또는 비밀번호를 확인해 주세요.</span
              >
              <a
                href="/index.html"
                class="submit-button"
                id="submit-login"
                aria-label="로그인버튼"
                data-role="login-submit"
                aria-disabled="true"
              >
                로그인
              </a>
            </form>
          </div>
          <!-- 회원가입 이동 -->
          <div class="join-button">
            <span class="join-caption">아이디가 없으신가요?</span>
            <a href="/src/pages/signup/signup.html" class="join-to-button"
              >회원가입</a
            >
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
