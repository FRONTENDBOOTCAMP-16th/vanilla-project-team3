<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="오늘의 날씨/기분을 선택해 책 문구를 추천받는 사이트"
    />
    <link rel="icon" href="/bookicon.svg" />
    <script type="module" defer src="/src/main.js"></script>
    <script type="module" defer src="/src/pages/signup/signup.js"></script>
    <title>바닐라 팀프로젝트 문학소녀팀</title>
  </head>
  <body>
    <main class="container">
      <section class="auth-block signup-block">
        <!-- 네비게이션 시작 -->
        <nav class="navi-layout">
          <a href="/index.html" class="navi-home-button">
            <span class="sr-only">홈으로 돌아가기</span>
          </a>
        </nav>
        <!-- 네비게이션 끝 -->
        <div class="autu-box-form login-form" role="login">
          <!-- 메인(인트로) 리턴 버튼 끝 -->
          <!-- 로그인 폼  -->
          <div class="autu-login-box signup-platform">
            <p class="autu-title signup-title">회원가입</p>
            <form
              action=""
              method="post"
              class="autu-box-container signup-write"
              id="signup-container"
              role="회원가입영역"
            >
              <div class="new-id-input-box" aria-label="아이디입력">
                <label for="new-id-input-area" class="sr-only new-id-label"
                  >아이디</label
                >
                <input
                  type="text"
                  class="add-box new-id-box"
                  id="new-id-input-area"
                  placeholder="아이디를 입력해 주세요"
                  required
                />
                <span class="warning-block new-id-blank-warning" hidden
                  >이 아이디는 사용하실 수 없습니다.</span
                >
              </div>
              <div class="new-pw-input-box" aria-label="비밀번호입력">
                <label for="new-pw-input-area" class="sr-only new-pw-label"
                  >비밀번호</label
                >
                <input
                  type="password"
                  class="add-box new-pw-box"
                  id="new-pw-input-area"
                  placeholder="비밀번호를 입력해 주세요"
                  required
                />
                <span class="warning-block new-pw-blank-warning" hidden
                  >영어, 숫자, 특수문자 혼합 8자리 이상</span
                >
              </div>
              <div class="new-email-input-box" aria-label="이메일입력">
                <label
                  for="new-email-input-area"
                  class="sr-only new-email-label"
                  >이메일</label
                >
                <input
                  type="email"
                  class="add-box new-email-box"
                  id="new-email-input-area"
                  placeholder="이메일을 입력해 주세요"
                  required
                />
                <span class="warning-block new-email-blank-warning" hidden
                  ></span
                >
              </div>
              <button type="submit"
                class="submit-button"
                id="submit-signup"
                aria-label="회원가입버튼"
                data-role="signup-submit"
              >
                확인
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
