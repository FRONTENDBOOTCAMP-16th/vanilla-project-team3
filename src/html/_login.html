<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/public/bookicon.svg" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <script type="module" defer src="/src/main.js"></script>
    <title>바닐라 팀프로젝트 문학소녀팀</title>
  </head>
  <body>
    <main class="container">
      <section class="login" role="login">
        <!-- 메인(인트로) 리턴 버튼 -->
        <div class="return-home">
          <button type="button">
            <img
              src="./src/image/home.svg"
              alt="메인으로 돌아가기"
              aria-label="메인으로 돌아가기"
            />
          </button>
        </div>
        <!-- 메인(인트로) 리턴 버튼 끝 -->
        <!-- 로그인 폼  -->
        <div class="login-box">
          <p class="login-title">로그인</p>
          <form
            action=""
            method="get"
            class="login-box-container"
            id="login-container"
            role="로그인영역"
          >
            <div class="id-input-box" aria-label="아이디입력">
              <label for="id-input-area" class="sr-only id-label">아이디</label>
              <input
                type="text"
                class="id-box"
                id="id-input-area"
                placeholder="아이디를 입력해 주세요"
                required
              />
              <span class="id-blank-warning"
                >입력하신 아이디가 조회되지 않습니다.</span
              >
            </div>
            <div class="pw-input-box" aria-label="비밀번호입력">
              <label for="pw-input-area" class="sr-only pw-label"
                >비밀번호</label
              >
              <input
                type="password"
                class="pw-box"
                id="pw-input-area"
                placeholder="비밀번호를 입력해 주세요"
                required
              />
              <span class="pw-blank-warning">비밀번호가 옳지 않습니다.</span>
            </div>
            <button
              type="submit"
              class="submit-button"
              id="submit-login"
              aria-label="로그인버튼"
            ></button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
