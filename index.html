<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/public/bookicon.svg" />
    <link rel="stylesheet" href="/src/css/components/_popup.css" />
    <script type="module" defer src="/src/main.js"></script>
    <title>바닐라 팀프로젝트 문학소녀팀</title>
  </head>
  <body>

    <div class="needlogin-dialog-area">
      <button type="button" class="heart-btn" aria-label="문구 찜하기" aria-pressed="false">
         <svg class="icon-heart-on" aria-hidden="true" width="17" height="15" viewBox="0 0 17 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4.675 7.66747e-07C2.09313 7.66747e-07 0 2.15216 0 4.80685C0 9.6137 5.525 13.9836 8.5 15C11.475 13.9836 17 9.6137 17 4.80685C17 2.15216 14.9069 7.66747e-07 12.325 7.66747e-07C10.744 7.66747e-07 9.34575 0.807115 8.5 2.04248C8.06884 1.4112 7.49613 0.896001 6.83033 0.540477C6.16453 0.184953 5.42523 -0.000435085 4.675 7.66747e-07Z" fill="#DD4545"/>
          </svg>
          <svg class="icon-heart-off" aria-hidden="true" width="19" height="17" viewBox="0 0 19 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.675 1C3.09313 1 1 3.15216 1 5.80685C1 10.6137 6.525 14.9836 9.5 16C12.475 14.9836 18 10.6137 18 5.80685C18 3.15216 15.9069 1 13.325 1C11.744 1 10.3458 1.80711 9.5 3.04248C9.06884 2.4112 8.49613 1.896 7.83033 1.54048C7.16453 1.18495 6.42523 0.999565 5.675 1Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
      </button>
    
      <!-- <dialog class="login-dialog common-dialog" aria-labelledby="login-title" aria-describedby="login-desc">
        <h2 id="login-title" class="popup-title">로그인이 필요합니다.</h2>
        <p id="login-desc" class="popup-desc">로그인을 하셔야 이용할 수 있는 서비스입니다.</p>
        <form method="dialog">
          <button class="confirm-button">확인</button>
          <button class="close-dialog" aria-label="닫기">x</button>
        </form>
      </dialog> -->

      <dialog class="heart-list-dialog common-dialog" aria-labelledby="heart-list-title" aria-describedby="heart-list-desc">
        <h2 id="heart-list-title" class="popup-title">찜 리스트를 추가할 수 없습니다.</h2>
        <p id="heart-list-desc" class="popup-desc">마이페이지로 이동하시겠습니까?</p>
        <form method="dialog">
          <button class="confirm-button">확인</button>
          <button class="close-dialog" aria-label="닫기">x</button>
        </form>
      </dialog>


      <dialog class="my-page-dialog common-dialog" aria-labelledby="my-page-title">
        <h2 id="my-page-title" class="popup-title">My Page</h2>
      
        <section class="user-info-section" aria-label="사용자 정보">
          <div class="profile-area">
            <div class="profile-circle" role="img" aria-label="프로필 기본 이미지"></div>
          </div>
      
          <dl class="user-data">
            <div class="data-row">
              <dt>아이디</dt>
              <dd>abc111111</dd>
            </div>
            <div class="data-row">
              <dt>비밀번호</dt>
              <dd>**********</dd>
              <div class="button-group">
                <button type="button" class="sub-button">비밀번호 변경</button>
                <button type="button" class="sub-button danger">찜 항목 삭제</button>
              </div>
            </div>
          </dl>
        </section>
      
        <section class="heart-list-section">
          <h3 class="section-title">찜 리스트</h3>
          <ul class="book-list">
            <li><a href="#"><img src="book1.jpg" alt="책 제목 1"></a></li>
            <li><a href="#"><img src="book2.jpg" alt="책 제목 2"></a></li>
            </ul>
        </section>
      
        <form method="dialog">
          <button class="close-dialog" aria-label="닫기">x</button>
        </form>
      </dialog>


    </div>


  </body>
</html>
