<html lang="ko-KR">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/public/bookicon.svg" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <script type="module" defer src="/src/main.js"></script>
    <title>바닐라 팀프로젝트 문학소녀팀</title>
  </head>
  <body>
    <div class="needlogin-dialog-area">


      <dialog
        class="login-dialog common-dialog"
        aria-labelledby="login-title"
        aria-describedby="login-desc"
      >
        <h2 id="login-title" class="popup-title">로그인이 필요합니다.</h2>
        <p id="login-desc" class="popup-desc">
          로그인을 하셔야 이용할 수 있는 서비스입니다.
        </p>
        <form method="dialog">
          <button class="confirm-button">확인</button>
          <button class="close-dialog" aria-label="닫기">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 0C5.4 0 0 5.4 0 12C0 18.6 5.4 24 12 24C18.6 24 24 18.6 24 12C24 5.4 18.6 0 12 0ZM16.44 14.76C16.92 15.24 16.92 15.96 16.44 16.44C15.96 16.92 15.24 16.92 14.76 16.44L12 13.68L9.24 16.44C8.76 16.92 8.04 16.92 7.56 16.44C7.08 15.96 7.08 15.24 7.56 14.76L10.32 12L7.56 9.24C7.08 8.76 7.08 8.04 7.56 7.56C8.04 7.08 8.76 7.08 9.24 7.56L12 10.32L14.76 7.56C15.24 7.08 15.96 7.08 16.44 7.56C16.92 8.04 16.92 8.76 16.44 9.24L13.68 12L16.44 14.76Z"
                fill="#AAAAAA"
              />
            </svg>
          </button>
        </form>
      </dialog>

      <dialog
        class="heart-list-dialog common-dialog"
        aria-labelledby="heart-list-title"
        aria-describedby="heart-list-desc"
      >
        <h2 id="heart-list-title" class="popup-title">
          찜 리스트를 추가할 수 없습니다.
        </h2>
        <p id="heart-list-desc" class="popup-desc">
          마이페이지로 이동하시겠습니까?
        </p>
        <form method="dialog">
          <button class="confirm-button">확인</button>
          <button class="close-dialog" aria-label="닫기">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 0C5.4 0 0 5.4 0 12C0 18.6 5.4 24 12 24C18.6 24 24 18.6 24 12C24 5.4 18.6 0 12 0ZM16.44 14.76C16.92 15.24 16.92 15.96 16.44 16.44C15.96 16.92 15.24 16.92 14.76 16.44L12 13.68L9.24 16.44C8.76 16.92 8.04 16.92 7.56 16.44C7.08 15.96 7.08 15.24 7.56 14.76L10.32 12L7.56 9.24C7.08 8.76 7.08 8.04 7.56 7.56C8.04 7.08 8.76 7.08 9.24 7.56L12 10.32L14.76 7.56C15.24 7.08 15.96 7.08 16.44 7.56C16.92 8.04 16.92 8.76 16.44 9.24L13.68 12L16.44 14.76Z"
                fill="#AAAAAA"
              />
            </svg>
          </button>
        </form>
      </dialog>

      <dialog class="change-pw-dialog common-dialog">
        <h2 class="popup-title">비밀번호 변경</h2>
        <form method="dialog" class="pw-form">
          <div class="input-group">
            <input
              type="password"
              id="current-pw"
              placeholder="현재 비밀번호"
              required
            />
            <input
              type="password"
              id="new-pw"
              placeholder="새 비밀번호"
              required
            />
            <input
              type="password"
              id="confirm-pw"
              placeholder="새 비밀번호 확인"
              required
            />
          </div>
          <p class="pw-error-msg" style="color: red; display: none">
            비밀번호가 일치하지 않습니다.
          </p>
          <div class="button-group">
            <button type="submit" class="confirm-button">변경하기</button>
          </div>
        </form>
        <button class="close-dialog" aria-label="닫기">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 0C5.4 0 0 5.4 0 12C0 18.6 5.4 24 12 24C18.6 24 24 18.6 24 12C24 5.4 18.6 0 12 0ZM16.44 14.76C16.92 15.24 16.92 15.96 16.44 16.44C15.96 16.92 15.24 16.92 14.76 16.44L12 13.68L9.24 16.44C8.76 16.92 8.04 16.92 7.56 16.44C7.08 15.96 7.08 15.24 7.56 14.76L10.32 12L7.56 9.24C7.08 8.76 7.08 8.04 7.56 7.56C8.04 7.08 8.76 7.08 9.24 7.56L12 10.32L14.76 7.56C15.24 7.08 15.96 7.08 16.44 7.56C16.92 8.04 16.92 8.76 16.44 9.24L13.68 12L16.44 14.76Z"
              fill="#AAAAAA"
            />
          </svg>
        </button>
      </dialog>

      <dialog class="my-page-dialog" aria-labelledby="my-page-title">
        <h2 id="my-page-title" class="popup-title">My Page</h2>

        <section class="user-info-section" aria-label="사용자 정보">
          <div class="profile-area">
            <img
              class="profile-circle"
              src="https://picsum.photos/100"
              alt="프로필 기본 이미지"
            />
          </div>

          <dl class="user-data">
            <div class="data-row">
              <dt>아이디</dt>
              <dd>abc111111</dd>
            </div>
            <div class="data-row">
              <dt>비밀번호</dt>
              <dd>**********</dd>
              <div class="button-group">
                <button type="button" class="change-pw-button my-page-button">
                  비밀번호 변경
                </button>
                <button
                  type="button"
                  class="delete-book-list-button my-page-button"
                >
                  찜 항목 삭제
                </button>
              </div>
            </div>
          </dl>
        </section>
