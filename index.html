<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/public/bookicon.svg" />
    <link rel="stylesheet" href="/src/css/components/_popup.css" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="stylesheet" href="./src/css/components/_index.css" />
    <script type="module" defer src="/src/main.js"></script>
    <title>바닐라 팀프로젝트 문학소녀팀</title>
  </head>
  <body>
    <!-- 책 레이아웃 시작 -->
    <section class="section-page-layout">
      <!-- 네비게이션 시작 -->
      <nav class="navi-layout">
        <button class="navi-mypage-button">
          <span class="sr-only">마이페이지</span>
        </button>
        <button class="navi-home-button">
          <span class="sr-only">홈으로 돌아가기</span>
        </button>
      </nav>
      <!-- 네비게이션 끝 -->

      <h2 class="page-layout-title">나의 작은 마음 도서관</h2>
      <p class="page-layout-subtitle">당신에 대해 알려주세요.</p>

      <!-- 이모지 영역 시작 -->
      <article class="section-page-area">
        <span class="sr-only">날씨를 선택해 주세요</span>

        <ul class="select-weather" role="checkbox" data-checked="dubbleChecked">
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-weather-input"
              name="checkbox-weather"
              id="checkbox-weather-sunny"
            />
            <label class="checkbox-weather-label" for="checkbox-weather-sunny">
              <img aria-hidden="true" src="/src/image/sunny.svg" alt="" />
              <span class="sr-only">해</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-weather-input"
              name="checkbox-weather"
              id="checkbox-weather-cloud"
            />
            <label class="checkbox-weather-label" for="checkbox-weather-cloud">
              <img aria-hidden="true" src="/src/image/cloud.svg" alt="" />
              <span class="sr-only">구름</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-weather-input"
              name="checkbox-weather"
              id="checkbox-weather-rainy"
            />
            <label class="checkbox-weather-label" for="checkbox-weather-rainy">
              <img aria-hidden="true" src="/src/image/rainy.svg" alt="" />
              <span class="sr-only">비</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-weather-input"
              name="checkbox-weather"
              id="checkbox-weather-snowdrop"
            />
            <label
              class="checkbox-weather-label"
              for="checkbox-weather-snowdrop"
            >
              <img aria-hidden="true" src="/src/image/snowdrop.svg" alt="" />
              <span class="sr-only">눈</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-weather-input"
              name="checkbox-weather"
              id="checkbox-weather-dustwind"
            />
            <label
              class="checkbox-weather-label"
              for="checkbox-weather-dustwind"
            >
              <img aria-hidden="true" src="/src/image/dustwind.svg" alt="" />
              <span class="sr-only">눈</span>
            </label>
          </li>
        </ul>

        <!-- 기분 선택 영역 시작 -->
        <span class="sr-only">기분을 선택해 주세요</span>
        <ul class="select-mood" role="checkbox" data-checked="dubbleChecked">
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-mood-input"
              name="checkbox-mood"
              id="checkbox-mood-smile"
            />
            <label class="checkbox-mood-label" for="checkbox-mood-smile">
              <img aria-hidden="true" src="/src/image/smile.png" alt="" />
              <span class="sr-only">행복</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-mood-input"
              name="checkbox-mood"
              id="checkbox-mood-sad"
            />
            <label class="checkbox-mood-label" for="checkbox-mood-sad">
              <img aria-hidden="true" src="/src/image/sad.png" alt="" />
              <span class="sr-only">슬픔</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-mood-input"
              name="checkbox-mood"
              id="checkbox-mood-impassive"
            />
            <label class="checkbox-mood-label" for="checkbox-mood-impassive">
              <img aria-hidden="true" src="/src/image/impassive.png" alt="" />
              <span class="sr-only">그저그럼</span>
            </label>
          </li>
          <li class="checkbox-button-area">
            <input
              type="checkbox"
              class="checkbox-mood-input"
              name="checkbox-mood"
              id="checkbox-mood-tired"
            />
            <label class="checkbox-mood-label" for="checkbox-mood-tired">
              <img aria-hidden="true" src="/src/image/tired.png" alt="" />
              <span class="sr-only">피곤함</span>
            </label>
          </li>
        </ul>
        <!-- 기분 선택 영역 끝 -->
      </article>
      <!-- 이모지 영역 꿑 -->

      <!-- 로그인 영역 시작 -->
      <article class="user-submit-area">
        <button class="user-test-check">비회원 확인하기</button>
        <button class="user-login">로그인</button>
        <button class="user-join">회원가입</button>
      </article>
      <!-- 로그인 영역 끝 -->

      <!-- 이모지 노트 시작 -->
      <div class="emoji-noti" aria-hidden="true">
        <span class="emoji-noti-text"
          >감정 / 기분은 최대 두개만 선택 가능해요!</span
        >
      </div>
      <!-- 이모지 노트 끝 -->
    </section>
    <div class="needlogin-dialog-area">
      <button
        type="button"
        class="heart-btn"
        aria-label="문구 찜하기"
        aria-pressed="false"
      >
        <svg
          class="icon-heart-on"
          aria-hidden="true"
          width="17"
          height="15"
          viewBox="0 0 17 15"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M4.675 7.66747e-07C2.09313 7.66747e-07 0 2.15216 0 4.80685C0 9.6137 5.525 13.9836 8.5 15C11.475 13.9836 17 9.6137 17 4.80685C17 2.15216 14.9069 7.66747e-07 12.325 7.66747e-07C10.744 7.66747e-07 9.34575 0.807115 8.5 2.04248C8.06884 1.4112 7.49613 0.896001 6.83033 0.540477C6.16453 0.184953 5.42523 -0.000435085 4.675 7.66747e-07Z"
            fill="#DD4545"
          />
        </svg>
        <svg
          class="icon-heart-off"
          aria-hidden="true"
          width="19"
          height="17"
          viewBox="0 0 19 17"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M5.675 1C3.09313 1 1 3.15216 1 5.80685C1 10.6137 6.525 14.9836 9.5 16C12.475 14.9836 18 10.6137 18 5.80685C18 3.15216 15.9069 1 13.325 1C11.744 1 10.3458 1.80711 9.5 3.04248C9.06884 2.4112 8.49613 1.896 7.83033 1.54048C7.16453 1.18495 6.42523 0.999565 5.675 1Z"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <dialog class="login-dialog common-dialog" aria-labelledby="login-title" aria-describedby="login-desc">
        <h2 id="login-title" class="popup-title">로그인이 필요합니다.</h2>
        <p id="login-desc" class="popup-desc">로그인을 하셔야 이용할 수 있는 서비스입니다.</p>
        <form method="dialog">
          <button class="confirm-button">확인</button>
          <button class="close-dialog" aria-label="닫기">x</button>
        </form>
      </dialog>

      <dialog
        class="heart-list-dialog common-dialog"
        aria-labelledby="heart-list-title"
        aria-describedby="heart-list-desc"
      >
        <h2 id="heart-list-title" class="popup-title">
          찜 리스트를 추가할 수 없습니다.
        </h2>
        <p id="heart-list-desc" class="popup-desc">
          마이페이지로 이동하시겠습니까?
        </p>
        <form method="dialog">
          <button class="confirm-button">확인</button>
          <button class="close-dialog" aria-label="닫기">x</button>
        </form>
      </dialog>

      <dialog
        class="my-page-dialog"
        aria-labelledby="my-page-title"
      >
        <h2 id="my-page-title" class="popup-title">My Page</h2>

        <section class="user-info-section" aria-label="사용자 정보">
          <div class="profile-area">
            <img class="profile-circle" src="/public/bookicon.svg" alt="프로필 기본 이미지" />
          </div>

          <dl class="user-data">
            <div class="data-row">
              <dt>아이디</dt>
              <dd>abc111111</dd>
            </div>
            <div class="data-row">
              <dt>비밀번호</dt>
              <dd>**********</dd>
              <div class="button-group">
                <button type="button" class="change-pw-button my-page-button">비밀번호 변경</button>
                <button type="button" class="delete-book-list-button my-page-button">찜 항목 삭제</button>
              </div>
            </div>
          </dl>
        </section>

        <section class="heart-list-section">
          <h3 class="section-title">찜 리스트</h3>
          <ul class="book-list">
            <li>
              <button type="button" class="delete-item-button" aria-label="삭제">×</button>
              <a href="#"><img src="book1.jpg" alt="책 제목 1" /></a>
            </li>
             <li>
               <button type="button" class="delete-item-button" aria-label="삭제">×</button>
              <a href="#"><img src="book2.jpg" alt="책 제목 2" /></a>
            </li>
             <li>
               <button type="button" class="delete-item-button" aria-label="삭제">×</button>
              <a href="#"><img src="book3.jpg" alt="책 제목 3" /></a>
            </li>
             <li>
               <button type="button" class="delete-item-button" aria-label="삭제">×</button>
              <a href="#"><img src="book4.jpg" alt="책 제목 4" /></a>
            </li>
             <li>
               <button type="button" class="delete-item-button" aria-label="삭제">×</button>
              <a href="#"><img src="book5.jpg" alt="책 제목 5" /></a>
            </li>
             <li>
               <button type="button" class="delete-item-button" aria-label="삭제">×</button>
              <a href="#"><img src="book6.jpg" alt="책 제목 6" /></a>
            </li>
          </ul>
        </section>

        <form method="dialog">
          <button class="close-dialog" aria-label="닫기">x</button>
        </form>
      </dialog>
    </div>
    <!-- 레이아웃 박스 -->
    <main class="container">
      <section class="my-page-box" role="modal-list">
        <div class="profile-box">
          <div class="my-page-contents" >
            <!-- 상단 타이틀 및 닫기버튼 -->
            <div class="mypage-top-title-close">
              <p class="page-title">My Page</p>
              <button type="button" class="mypage-close" aria-label="닫기">
                <span class="sr_only">창 닫기</span>
              </button>
            </div>
            <!-- 상단 타이틀 및 닫기버튼 끝-->
            <!-- 상단 info -->
            <div class="my-page-profile">
              <div class="profile-container" aria-label="프로필">
                <img
                  src="https://picsum.photos/100"
                  alt="프로필이미지"
                  class="profile"
                  aria-label="프로필 이미지"
                />
                <div class="profile-setting">
                  <ul class="personal-infomation">
                    <li class="id-label">
                      아이디 <span class="login-id">abc111111</span>
                    </li>
                    <li class="pw-label">
                      비밀번호 <span class="login-pw">********</span>
                    </li>
                  </ul>
                  <ul class="setting-button">
                    <li class="change-pw-button">
                      <button type="button" aria-label="비밀번호변경">
                        비밀번호 변경
                      </button>
                    </li>
                    <li class="">
                      <button type="button" aria-label="찜항목삭제">
                        찜 항목 삭제
                      </button>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
            <!-- 상단 info 끝 -->
            <!-- 찜 항목 리스트 -->
            <div class="like-book-list">
              <ul>
                <li class="like-book-list">1</li>
                <li class="like-book-list">2</li>
                <li class="like-book-list">3</li>
                <li class="like-book-list">4</li>
                <li class="like-book-list">5</li>
                <li class="like-book-list">6</li>
              </ul>
            </div>
            <!-- 찜 항목 리스트 끝  -->
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
