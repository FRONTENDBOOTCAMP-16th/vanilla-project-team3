<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" defer src="/src/main.js"></script>
    <title>바닐라 팀프로젝트 문학소녀팀</title>
  </head>
  <body>
    <!-- 이모지 영역 시작 -->
    <section>
      <h2>당신의 기분을 이해해봐요</h2>
      <span class="sr-only">날씨를 선택해 주세요</span>

      <ul role="group">
        <li>
          <input type="radio" name="radio-mood-radio" id="radio-mood-sunny" />
          <label for="radio-mood-radio">
            <img src="/src/image/sunny.svg" alt="" />
            <span class="sr-only">날씨 - 해</span>
          </label>
        </li>
        <li>
          <input type="radio" name="radio-mood-radio" id="radio-mood-cloud" />
          <label for="radio-mood-radio">
            <img src="/src/image/cloud.svg" alt="" />
            <span class="sr-only">날씨 - 구름</span>
          </label>
        </li>
        <li>
          <input type="radio" name="radio-mood-radio" id="radio-mood-rain" />
          <label for="radio-mood-radio">
            <img src="/src/image/rainy.svg" alt="" />
            <span class="sr-only">날씨 - 비</span>
          </label>
        </li>
        <li>
          <input type="radio" name="radio-mood-radio" id="radio-mood-snow" />
          <label for="radio-mood-radio">
            <img src="/src/image/snowdrop.svg" alt="" />
            <span class="sr-only">날씨 - 눈</span>
          </label>
        </li>
        <li>
          <input
            type="radio"
            name="radio-mood-radio"
            id="radio-mood-dustwind"
          />
          <label for="radio-mood-radio">
            <img src="/src/image/dustwind.svg" alt="" />
            <span class="sr-only">날씨 - 눈</span>
          </label>
        </li>
      </ul>
    </section>
    <!-- 이모지 영역 꿑 -->
  </body>
</html>
