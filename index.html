<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <title>바닐라 팀프로젝트 문학소녀팀</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="오늘의 날씨/기분을 선택해 책 문구를 추천받는 사이트"
    />
    <link rel="icon" href="/bookicon.svg" />
    <script type="module" defer src="/src/main.js"></script>
    <script type="module" defer src="/src/js/home/home.js"></script>
  </head>
  <body>
    <!-- 레이아웃 박스 -->
    <main class="container main-intro">
      <!-- 네비게이션 시작 -->
      <nav class="navi-layout">
        <a href="#" class="navi-mypage-button">
          <span class="sr-only">마이페이지</span>
        </a>
        <a href="#" class="navi-home-button">
          <span class="sr-only">홈으로 돌아가기</span>
        </a>
      </nav>
      <!-- 네비게이션 끝 -->

      <!-- 책 레이아웃 시작 -->
      <section class="section-page-layout">
        <h2 class="page-layout-title">나의 작은 마음 도서관</h2>
        <p class="page-layout-subtitle">당신에 대해 알려주세요.</p>

        <!-- 이모지 영역 시작 -->
        <article class="section-page-area">
          <span class="sr-only">날씨를 선택해 주세요</span>

          <ul
            class="select-weather"
            role="checkbox"
            data-checked="doubleChecked"
          >
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-weather-input"
                name="checkbox-weather"
                id="checkbox-weather-sunny"
                data-value="sunny"
              />
              <label
                class="checkbox-weather-label"
                for="checkbox-weather-sunny"
              >
                <img aria-hidden="true" src="/src/image/sunny.svg" alt="" />
                <span class="sr-only">해</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-weather-input"
                name="checkbox-weather"
                id="checkbox-weather-cloudy"
                data-value="cloudy"
              />
              <label
                class="checkbox-weather-label"
                for="checkbox-weather-cloudy"
              >
                <img aria-hidden="true" src="/src/image/cloud.svg" alt="" />
                <span class="sr-only">구름</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-weather-input"
                name="checkbox-weather"
                id="checkbox-weather-rainy"
                data-value="rainy"
              />
              <label
                class="checkbox-weather-label"
                for="checkbox-weather-rainy"
              >
                <img aria-hidden="true" src="/src/image/rainy.svg" alt="" />
                <span class="sr-only">비</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-weather-input"
                name="checkbox-weather"
                id="checkbox-weather-snowy"
                data-value="snowy"
              />
              <label
                class="checkbox-weather-label"
                for="checkbox-weather-snowy"
              >
                <img aria-hidden="true" src="/src/image/snowdrop.svg" alt="" />
                <span class="sr-only">눈</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-weather-input"
                name="checkbox-weather"
                id="checkbox-weather-dustwind"
                data-value="dusty"
              />
              <label
                class="checkbox-weather-label"
                for="checkbox-weather-dustwind"
              >
                <img aria-hidden="true" src="/src/image/dustwind.svg" alt="" />
                <span class="sr-only">황사</span>
              </label>
            </li>
          </ul>

          <!-- 기분 선택 영역 시작 -->
          <span class="sr-only">기분을 선택해 주세요</span>
          <ul class="select-mood" role="checkbox" data-checked="doubleChecked">
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-mood-input"
                name="checkbox-mood"
                id="checkbox-mood-smile"
                data-value="happy"
              />
              <label class="checkbox-mood-label" for="checkbox-mood-smile">
                <img aria-hidden="true" src="/src/image/smile.png" alt="" />
                <span class="sr-only">행복</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-mood-input"
                name="checkbox-mood"
                id="checkbox-mood-sad"
                data-value="sad"
              />
              <label class="checkbox-mood-label" for="checkbox-mood-sad">
                <img aria-hidden="true" src="/src/image/sad.png" alt="" />
                <span class="sr-only">슬픔</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-mood-input"
                name="checkbox-mood"
                id="checkbox-mood-impassive"
                data-value="soso"
              />
              <label class="checkbox-mood-label" for="checkbox-mood-impassive">
                <img aria-hidden="true" src="/src/image/impassive.png" alt="" />
                <span class="sr-only">그저그럼</span>
              </label>
            </li>
            <li class="checkbox-button-area">
              <input
                type="checkbox"
                class="checkbox-mood-input"
                name="checkbox-mood"
                id="checkbox-mood-tired"
                data-value="bad"
              />
              <label class="checkbox-mood-label" for="checkbox-mood-tired">
                <img aria-hidden="true" src="/src/image/tired.png" alt="" />
                <span class="sr-only">피곤함</span>
              </label>
            </li>
          </ul>
          <!-- 기분 선택 영역 끝 -->
        </article>
        <!-- 이모지 영역 꿑 -->

        <!-- 로그인 영역 시작 -->
        <div class="user-submit-area">
          <a
            href="/src/pages/result/result.html"
            class="user-test-check"
            aria-disabled="true"
            >비회원 확인하기</a
          >
          <a href="/src/pages/login/login.html" class="user-login">로그인</a>
          <a href="/src/pages/signup/signup.html" class="user-join">회원가입</a>
        </div>
        <!-- 로그인 영역 끝 -->

        <!-- 이모지 노트 시작 -->
        <div
          class="emoji-noti no-transition"
          aria-hidden="true"
          aria-live="polite"
        >
          <span class="emoji-noti-text"
            >감정 / 기분은 각각 최대 두개씩 선택 가능해요!</span
          >
        </div>
        <!-- 이모지 노트 끝 -->
      </section>
      <!-- 책 레이아웃 끝 -->
    </main>
  </body>
</html>
